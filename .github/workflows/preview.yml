name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Build & deploy preview for open/updated PRs
  # ──────────────────────────────────────────────
  deploy-preview:
    name: Build & deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate schemas
        run: npm run generate

      - name: Validate schemas
        run: npm run validate

      - name: Build HTML documentation
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Post or update PR comment with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = '${{ steps.deployment.outputs.page_url }}';
            const marker = '<!-- avrodoc-preview-comment -->';
            const body = `${marker}\n🔍 **Avrodoc Preview** — [Open preview ↗](${previewUrl})\n\n> Updated on every push. Removed when the PR is closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  # ──────────────────────────────────────────────
  # No cleanup needed — preview deployments expire
  # automatically when the PR closes.
  # ──────────────────────────────────────────────


