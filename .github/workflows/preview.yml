name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    name: Build and deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate schemas
        run: npm run generate

      - name: Validate schemas
        run: npm run validate

      - name: Build HTML documentation
        run: npm run build

      - name: Deploy PR preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Post or update PR comment with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const previewUrl = 'https://' + owner + '.github.io/' + repo + '/pr-' + prNumber + '/';
            const marker = '<!-- avrodoc-preview-comment -->';
            const body = marker + '\n🔍 **Avrodoc Preview** — [Open preview](' + previewUrl + ')\n\n> Updated on every push. Removed when PR closes.';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }

  cleanup-preview:
    name: Clean up preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "pr-${PR_NUMBER}" ]; then
            git rm -rf "pr-${PR_NUMBER}"
            git commit -m "chore: remove preview for PR #${PR_NUMBER}"
            git push
          else
            echo "No preview directory for PR #${PR_NUMBER}, skipping."
          fi
